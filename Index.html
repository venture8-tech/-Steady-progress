<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#100d12">
<title>Strong & Steady Home</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
 --bg:#100d12;--surface:#19151d;--surface2:#241e29;--surface3:#302738;
 --text:#f8f1f6;--muted:#aa9daa;--pink:#d78bae;--violet:#9c7ad3;
 --peach:#e79b78;--mint:#7fb8a2;--gold:#e0b866;--line:#382e3e;
 --shadow:0 18px 50px rgba(0,0,0,.34)
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;-webkit-tap-highlight-color:transparent}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
.app{max-width:520px;margin:auto;padding:0 18px max(118px,calc(env(safe-area-inset-bottom) + 98px));padding-top:max(20px,env(safe-area-inset-top))}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-size:13px;letter-spacing:2.1px;text-transform:uppercase;color:#c9bac7}
.icon{width:42px;height:42px;border:1px solid var(--line);border-radius:14px;background:var(--surface);color:var(--text);font-size:18px}
.hero{position:relative;overflow:hidden;background:
 radial-gradient(circle at 90% 12%,rgba(215,139,174,.25),transparent 38%),
 radial-gradient(circle at 10% 100%,rgba(156,122,211,.14),transparent 45%),
 linear-gradient(145deg,var(--surface),#120f15);
 border:1px solid var(--line);border-radius:22px;padding:22px;margin:20px 0 16px;box-shadow:var(--shadow)}
.hero:before{content:"";position:absolute;inset:0 auto 0 0;width:6px;background:var(--accent,var(--pink))}
.eyebrow{font-size:11px;letter-spacing:2.2px;text-transform:uppercase;color:var(--muted);font-weight:800}
.hero h1{font-size:38px;line-height:.98;letter-spacing:-1.35px;text-transform:uppercase;margin:8px 0}
.sub{font-size:13px;color:var(--accent,var(--pink));font-weight:850;text-transform:uppercase;letter-spacing:.6px}
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:18px}
.metric{padding:11px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.055);border-radius:13px}
.metric b{display:block;font-size:17px}.metric span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.phase{display:flex;gap:10px;background:linear-gradient(135deg,rgba(156,122,211,.13),rgba(215,139,174,.08));border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:13px}
.phase .bubble{font-size:22px}.phase b{font-size:13px}.phase p{font-size:11px;color:var(--muted);line-height:1.45;margin:3px 0 0}
.weekrow{display:flex;gap:8px;overflow:auto;padding-bottom:4px;scrollbar-width:none}.weekrow::-webkit-scrollbar{display:none}
.weekbtn{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;padding:9px 13px;font-size:12px;font-weight:800}
.weekbtn.active{background:var(--violet);color:white;border-color:var(--violet)}
.daystrip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;background:var(--surface);border:1px solid var(--line);border-radius:17px;padding:8px;margin-top:12px}
.day{border:0;background:transparent;color:var(--muted);border-radius:11px;padding:8px 2px}
.day.active{background:var(--accent,var(--pink));color:#1a1118;font-weight:900}.day .l{font-size:11px;font-weight:850}.day .n{font-size:10px;margin-top:5px}
.day.done:after{content:"✓";display:block;font-size:10px;margin-top:2px;color:var(--gold)}.day.active.done:after{color:#1a1118}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:18px 0}
.tab{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:13px;padding:10px 3px;font-weight:850;font-size:12px}
.tab.active{background:linear-gradient(135deg,var(--pink),var(--violet));color:white;border-color:transparent}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px}
.card.complete{border-color:var(--gold);background:linear-gradient(145deg,rgba(224,184,102,.11),var(--surface))}
.session{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.session button{border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:14px;padding:12px;font-weight:900}
.session .start{background:var(--mint);color:#101713;border-color:var(--mint)}
.guide{border-left:4px solid var(--accent,var(--pink));padding-left:12px}
.guide b{font-size:14px}.guide p{font-size:12px;color:var(--muted);line-height:1.5}
.ex-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.ex-name{font-size:16px;font-weight:900;line-height:1.2}.target{font-size:13px;color:var(--accent,var(--pink));font-weight:900}
.tip{color:var(--muted);font-size:12px;line-height:1.48;margin:8px 0 13px}
.sets{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.set{border:0;background:var(--surface3);color:var(--muted);border-radius:12px;padding:11px 3px;font-weight:900;min-height:43px}
.set.done{background:var(--gold);color:#17120d}
.details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.small{width:100%;background:#110e13;color:var(--text);border:1px solid var(--line);border-radius:11px;padding:10px}
.rpe{display:flex;align-items:center;gap:8px;margin-top:10px}.rpe label{font-size:11px;color:var(--muted)}
.rpe select{flex:1;background:#110e13;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:8px}
.suggestion{margin-top:10px;padding:10px;border-radius:11px;background:rgba(127,184,162,.09);border:1px solid rgba(127,184,162,.25);font-size:11px;color:#c7ded5;line-height:1.4}
.section{font-size:18px;font-weight:950;margin:22px 0 10px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:var(--surface);border:1px solid var(--line);border-radius:17px;padding:16px}
.stat .v{font-size:24px;font-weight:950}.stat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:4px}
.bar{height:9px;background:var(--surface3);border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--pink),var(--violet));border-radius:99px}
.habits{display:grid;grid-template-columns:1fr 1fr;gap:9px}.habit{border:1px solid var(--line);background:var(--surface2);color:var(--muted);border-radius:14px;padding:13px;text-align:left;font-weight:800}
.habit.done{background:rgba(127,184,162,.18);border-color:var(--mint);color:var(--text)}.habit span{display:block;font-size:11px;font-weight:500;margin-top:3px}
.meal-group{margin-bottom:16px}.meal-title{font-weight:950;margin-bottom:8px;color:var(--pink)}.meal{border:1px solid var(--line);background:var(--surface2);border-radius:14px;padding:12px;margin-bottom:8px}
.meal b{font-size:13px}.meal p{color:var(--muted);font-size:12px;line-height:1.45;margin:5px 0 0}
.note{width:100%;min-height:78px;background:#110e13;color:var(--text);border:1px solid var(--line);border-radius:13px;padding:12px;resize:vertical}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.action{border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:15px;padding:14px;text-align:left;font-weight:900}
.action span{display:block;color:var(--muted);font-size:11px;font-weight:500;margin-top:4px}
.rest{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);z-index:50;width:min(92%,470px);background:var(--surface2);border:1px solid var(--line);border-radius:18px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.rest.urgent{background:var(--pink);color:#20131b}.rest .grow{flex:1;min-width:0}.rest .name{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rest.urgent .name{color:#5b3145}
.rest .time{font-size:28px;font-weight:950;min-width:72px;text-align:center}.rest button{border:0;border-radius:10px;background:rgba(255,255,255,.09);color:inherit;padding:8px 10px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:70;display:flex;align-items:flex-end;justify-content:center}
.sheet{width:min(100%,520px);max-height:90vh;overflow:auto;background:var(--surface);border-radius:25px 25px 0 0;padding:22px;padding-bottom:max(24px,env(safe-area-inset-bottom))}
.field{margin-bottom:14px}.field label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}.field input,.field select{width:100%;background:#110e13;border:1px solid var(--line);color:var(--text);border-radius:12px;padding:12px}
.primary{width:100%;border:0;border-radius:13px;padding:13px;background:linear-gradient(135deg,var(--pink),var(--violet));color:white;font-weight:950}
.toast{position:fixed;top:18%;left:50%;transform:translateX(-50%);z-index:90;background:var(--gold);color:#17120d;padding:13px 18px;border-radius:14px;font-weight:950;box-shadow:var(--shadow)}
.empty{text-align:center;color:var(--muted);padding:30px 18px}.foot{text-align:center;color:var(--muted);font-size:11px;margin:20px 0}
.onboard{min-height:100vh;display:flex;align-items:center}.onboard h1{font-size:43px;line-height:1.02;margin:10px 0}.spark{font-size:44px}.warning{font-size:11px;color:var(--muted);line-height:1.55;margin-top:14px}
@media(max-width:380px){.hero h1{font-size:33px}.sets{grid-template-columns:repeat(3,1fr)}.tabs{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body><div id="root"></div>
<script>
var START="2026-07-13";
var K={profile:"ssh-profile-v1",workout:"ssh-workout-v1",weight:"ssh-weight-v1",prefs:"ssh-prefs-v1",habits:"ssh-habits-v1",measure:"ssh-measure-v1"};
var COLORS={glute:"var(--peach)",cardio:"var(--violet)",recovery:"var(--mint)",upper:"var(--pink)",rest:"var(--muted)"};
var PHASES=[
 {min:1,max:3,name:"Foundation",icon:"🌱",desc:"Learn each movement and finish most sets with 2-3 good reps left."},
 {min:4,max:4,name:"Recovery Week",icon:"🧘‍♀️",desc:"Use lighter weights and fewer sets so the body can adapt."},
 {min:5,max:7,name:"Build",icon:"🔥",desc:"Add small amounts of weight or reps while keeping form clean."},
 {min:8,max:8,name:"Deload",icon:"🌙",desc:"Reduce effort and volume. Planned recovery helps future progress."},
 {min:9,max:11,name:"Glute Progress",icon:"🍑",desc:"Prioritize stronger hip thrusts, hinges, split squats, and abduction work."},
 {min:12,max:12,name:"Benchmark",icon:"✨",desc:"Repeat familiar exercises and celebrate strength and consistency gains."}
];
var MEALS={
"Breakfast":[["Egg Breakfast","Eggs or egg whites with vegetables, whole-grain toast, and fruit."],["Greek Yogurt Bowl","Plain Greek yogurt with berries, chia seeds, and a small serving of oats."],["Protein Smoothie","Milk or unsweetened alternative, fruit, protein powder if desired, and ice."]],
"Lunch":[["Chicken Bowl","Chicken, rice or potatoes, vegetables, and a flavorful sauce in a reasonable portion."],["Tuna Wrap","Tuna in a whole-wheat wrap with lettuce, cucumber, and fruit on the side."],["Turkey Stir-Fry","Lean turkey, mixed vegetables, and rice or cauliflower rice."]],
"Snack":[["Fruit + Nut Butter","Fruit with peanut or almond butter."],["Protein Snack","Greek yogurt, cottage cheese, eggs, or another preferred protein source."],["Simple Shake","Fruit, yogurt or milk, and ice."]],
"Dinner":[["Salmon Plate","Salmon, roasted vegetables, and quinoa, rice, or potatoes."],["Chicken Dinner","Chicken breast or thigh, sweet potato, and green vegetables."],["Fish or Turkey","White fish or turkey with vegetables and a satisfying carbohydrate."]]
};
function load(k,f){try{var r=localStorage.getItem(k);return r===null?f:JSON.parse(r)}catch(e){return f}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){return false}}
function iso(d){var x=new Date(d);x.setMinutes(x.getMinutes()-x.getTimezoneOffset());return x.toISOString().slice(0,10)}
function today(){return iso(new Date())}
function phase(w){return PHASES.find(function(p){return w>=p.min&&w<=p.max})}
function dateForWeekDay(w,index){var d=new Date(START+"T12:00:00");d.setDate(d.getDate()+((w-1)*7)+index);return iso(d)}
function weekFromDate(ds){var a=new Date(START+"T12:00:00"),b=new Date(ds+"T12:00:00");return Math.max(1,Math.min(12,Math.floor((b-a)/604800000)+1))}
function setCount(w,base){if(w===4||w===8)return Math.max(2,base-1);if(w>=9&&base===3)return 4;return base}
function exercise(id,name,sets,target,tip,kind){return{id:id,name:name,sets:sets,target:target,tip:tip,kind:kind||"strength"}}
function cardioTarget(w,type){
 if(type==="walk"){
  if(w<=2)return"20 min easy";
  if(w<=4)return"25 min easy";
  if(w<=7)return"30 min steady";
  if(w===8)return"20-25 min easy";
  if(w<=11)return"30-35 min steady";
  return"30 min favorite pace";
 }
 if(type==="bike"){
  if(w<=2)return"15 min easy";
  if(w<=4)return"18 min steady";
  if(w<=7)return"20-25 min steady";
  if(w===8)return"15 min easy";
  if(w<=11)return"25-30 min steady";
  return"25 min favorite pace";
 }
 return"20-30 min";
}
function planFor(w,dow){
 var light=w===4||w===8, advanced=w>=9;
 if(dow===0)return{label:"Full Rest Day",tag:"rest",sub:"Recover · Hydrate · Reset",coach:"Complete rest is part of the plan.",items:[]};
 if(dow===1)return{label:"Glute Strength",tag:"glute",sub:"Hip Thrust · Hinge · Squat",coach:"This is the main progressive-overload day. Increase only when the final reps stay controlled.",items:[
  exercise("mwu","Dynamic Warm-Up",1,"6-8 min","Easy treadmill walking, hip hinges, bodyweight squats, and glute bridges.","warmup"),
  exercise("mht","Dumbbell Hip Thrust",setCount(w,4),light?"8 easy reps":"8-12 reps","Upper back against a sturdy couch. Place a padded dumbbell across the hips and pause at the top."),
  exercise("mrdl","Dumbbell Romanian Deadlift",setCount(w,3),light?"8 reps":"8-12 reps","Push hips back, keep dumbbells close, and stop before the back rounds."),
  exercise("mgs","Goblet Squat to Chair",setCount(w,3),light?"8 reps":"10-12 reps","Use a chair as a depth target. Sit back under control and drive through the whole foot."),
  exercise("msl","Supported Split Squat",setCount(w,3),light?"6 / side":"8-10 / side","Hold a wall or chair for balance. Use a comfortable range."),
  exercise("mab","Banded Seated Abduction",setCount(w,3),light?"12 reps":"15-20 reps","Press knees out against the band and control the return."),
  exercise("mcd","Cool-Down Walk",1,"5 min","Slow treadmill walk and relaxed breathing.","cooldown")
 ]};
 if(dow===2)return{label:"Cardio + Core",tag:"cardio",sub:"Treadmill · Stability · Recovery",coach:"Incline walking is the default. Running is optional, not required.",items:[
  exercise("twalk","Treadmill Walk",1,cardioTarget(w,"walk"),"Use a pace that allows short conversation. Add a small incline only if comfortable.","cardio"),
  exercise("tmarch","Standing High-Knee March",setCount(w,3),"10 / side","Stand tall and move slowly."),
  exercise("tbird","Bird-Dog",setCount(w,3),"8-10 / side","Reach long without twisting the hips."),
  exercise("tdead","Dead Bug Heel Tap",setCount(w,3),"8-10 / side","Keep the lower back gently supported by the floor."),
  exercise("tpallof","Banded Pallof Press",setCount(w,3),"10-12 / side","Anchor the band securely and resist rotation."),
  exercise("tstretch","Gentle Stretch",1,"5 min","Hips, calves, upper back, and shoulders.","cooldown")
 ]};
 if(dow===3)return{label:"Upper Body + Mobility",tag:"upper",sub:"Back · Chest · Shoulders · Posture",coach:"This supports posture, balance, and total-body strength without taking focus away from glute training.",items:[
  exercise("uwu","Dynamic Warm-Up",1,"5-7 min","Arm circles, wall slides, light band rows, and easy marching.","warmup"),
  exercise("urow","One-Arm Dumbbell Row",setCount(w,3),"10-12 / side","Support one hand on a sturdy chair or couch."),
  exercise("upush","Incline Push-Up",setCount(w,3),"8-12 reps","Use a counter, sturdy table, or couch arm."),
  exercise("upress","Seated Dumbbell Overhead Press",setCount(w,3),"8-12 reps","Press through a pain-free range."),
  exercise("upull","Banded Lat Pulldown",setCount(w,3),"12-15 reps","Anchor the band safely overhead and pull elbows down."),
  exercise("ucurl","Dumbbell Curl",setCount(w,2),"10-15 reps","Keep elbows close and avoid swinging."),
  exercise("utri","Banded Tricep Pressdown",setCount(w,2),"10-15 reps","Use a secure anchor and controlled motion."),
  exercise("umob","Mobility Finish",1,"8 min","Gentle chest, shoulder, hip, and ankle mobility.","cooldown")
 ]};
 if(dow===4)return{label:"Glute Volume",tag:"glute",sub:"Split Squat · Bridge · Kickback",coach:"Use moderate loads and controlled reps. This session builds glute volume without needing gym machines.",items:[
  exercise("thwu","Treadmill Warm-Up",1,"6 min","Easy walk followed by bodyweight glute bridges.","warmup"),
  exercise("thsplit",advanced?"Bulgarian Split Squat":"Supported Reverse Lunge",setCount(w,3),light?"6 / side":"8-12 / side","Start with support. Elevate the rear foot only when balance and comfort are good."),
  exercise("thbridge","Dumbbell Glute Bridge",setCount(w,4),light?"10 reps":"12-15 reps","Pause and squeeze at the top."),
  exercise("thstep","Low Step-Up",setCount(w,3),light?"6 / side":"8-12 / side","Use a stable low step and drive through the working leg."),
  exercise("thkick","Banded Glute Kickback",setCount(w,3),"12-15 / side","Keep the pelvis square and avoid swinging."),
  exercise("thfrog","Frog Pump",setCount(w,3),"15-25 reps","Use a controlled short range and focus on the glutes."),
  exercise("thwalk","Banded Side Step",setCount(w,2),"10-15 / direction","Take short controlled steps and keep tension on the band."),
  exercise("thcd","Cool-Down",1,"5 min","Easy walk and gentle lower-body mobility.","cooldown")
 ]};
 if(dow===5)return{label:"Bike + Recovery",tag:"recovery",sub:"Low Impact · Mobility · Restore",coach:"This should help recovery, not compete with it.",items:[
  exercise("fbike","Indoor Bike",1,cardioTarget(w,"bike"),"Use smooth cadence and moderate resistance.","cardio"),
  exercise("fmob","Mobility Flow",1,"10 min","Hips, hamstrings, calves, upper back, and shoulders.","recovery"),
  exercise("fwalk","Optional Easy Walk",1,"10-15 min","Skip this if tired or unusually sore.","cardio")
 ]};
 return{label:"Glute Pump + Full Body",tag:"glute",sub:"Glute Burnout · Home Conditioning",coach:"This is the third glute exposure of the week, but it should feel lighter than Monday.",items:[
  exercise("swu","Warm-Up",1,"6 min","Easy bike or treadmill plus hip mobility.","warmup"),
  exercise("ssingle","Single-Leg Glute Bridge",setCount(w,3),"8-12 / side","Keep the pelvis level. Use two legs if needed."),
  exercise("ssumo","Dumbbell Sumo Squat",setCount(w,3),"10-15 reps","Use a comfortable stance and sit between the hips."),
  exercise("sgm","Banded Good Morning",setCount(w,3),"12-15 reps","Hinge at the hips while keeping the spine neutral."),
  exercise("shyd","Banded Fire Hydrant",setCount(w,3),"12-15 / side","Move slowly and avoid rotating the torso."),
  exercise("spump","Glute Pump Finisher",setCount(w,2),light?"15 reps":"20-30 reps","Choose frog pumps or band abductions and stop before form breaks."),
  exercise("scarry","Dumbbell Farmer Carry",setCount(w,2),"30-45 sec","Walk tall with controlled steps."),
  exercise("scardio","Optional Bike Finish",1,light?"5 min easy":"8-12 min easy","Skip if the legs feel overly fatigued.","cardio")
 ]};
}
var state={profile:load(K.profile,null),workout:load(K.workout,{}),weights:load(K.weight,{}),prefs:load(K.prefs,{rest:75,notes:{},details:{}}),habits:load(K.habits,{}),measurements:load(K.measure,{}),tab:"workout",selected:today(),week:1,rest:null,modal:null,toast:null};
state.week=weekFromDate(state.selected);
function prog(){return planFor(state.week,new Date(state.selected+"T12:00:00").getDay())}
function entry(ds){ds=ds||state.selected;var p=planFor(weekFromDate(ds),new Date(ds+"T12:00:00").getDay()),e=state.workout[ds];if(e)return e;var q={};p.items.forEach(function(x){q[x.id]=0});return{progress:q,completed:false,startedAt:null,finishedAt:null}}
function complete(e,p){return p.items.length>0&&p.items.every(function(x){return(e.progress[x.id]||0)>=x.sets})}
function persist(){save(K.workout,state.workout);save(K.weight,state.weights);save(K.prefs,state.prefs);save(K.habits,state.habits);save(K.measure,state.measurements)}
function total(){return Object.keys(state.workout).filter(function(k){return state.workout[k].completed}).length}
function weekPct(){var n=0,d=0;for(var i=0;i<7;i++){var ds=dateForWeekDay(state.week,i),p=planFor(state.week,new Date(ds+"T12:00:00").getDay());if(p.items.length){d++;if(state.workout[ds]&&state.workout[ds].completed)n++}}return d?Math.round(n/d*100):0}
function start(){var e=JSON.parse(JSON.stringify(entry()));e.startedAt=e.startedAt||Date.now();state.workout[state.selected]=e;persist();pop("Session started")}
function finish(){var p=prog(),e=JSON.parse(JSON.stringify(entry()));p.items.forEach(function(x){e.progress[x.id]=x.sets});e.completed=true;e.startedAt=e.startedAt||Date.now();e.finishedAt=Date.now();state.workout[state.selected]=e;state.rest=null;persist();pop("Workout complete ✨");render()}
function tapSet(id,i,name){var p=prog(),x=p.items.find(function(v){return v.id===id}),e=JSON.parse(JSON.stringify(entry())),cur=e.progress[id]||0;e.startedAt=e.startedAt||Date.now();e.progress[id]=i<cur?i:i+1;e.completed=complete(e,p);if(e.completed)e.finishedAt=Date.now();state.workout[state.selected]=e;if(i>=cur&&e.progress[id]<x.sets&&x.kind==="strength")state.rest={left:state.prefs.rest||75,name:name};persist();if(e.completed)pop("Day complete ✨");render()}
setInterval(function(){if(!state.rest)return;state.rest.left--;if(state.rest.left<=0){state.rest=null;pop("Rest complete");if(navigator.vibrate)navigator.vibrate([100,70,100])}render()},1000);
function pop(s){state.toast=s;render();setTimeout(function(){state.toast=null;render()},1500)}
function esc(s){return String(s||"").replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]})}
function duration(e){if(!e.startedAt)return"—";var end=e.finishedAt||Date.now();return Math.max(1,Math.round((end-e.startedAt)/60000))+"m"}
function previousDetail(id){
 for(var w=state.week-1;w>=1;w--){
  for(var i=6;i>=0;i--){
   var ds=dateForWeekDay(w,i),key=ds+"|"+id,d=state.prefs.details[key];
   if(d&&(d.weight||d.reps||d.rpe))return d;
  }
 }
 return null;
}
function suggestion(id){
 var d=previousDetail(id);if(!d)return"First time: choose a manageable resistance and record what she completes.";
 var rpe=parseFloat(d.rpe||0),txt="Last logged: "+(d.weight?d.weight+" resistance":"no weight")+(d.reps?", "+d.reps:"")+(rpe?", RPE "+rpe:"")+". ";
 if(rpe&&rpe<=7)txt+="Try 1-2 more reps or the smallest safe weight increase.";
 else if(rpe>=9)txt+="Repeat or reduce slightly until form feels controlled.";
 else txt+="Repeat the load and aim for cleaner reps or one small progression.";
 return txt;
}
function render(){
 var root=document.getElementById("root");if(!state.profile){root.innerHTML=onboard();bind();return}
 var p=prog(),e=entry(),accent=COLORS[p.tag],ph=phase(state.week),sets=p.items.reduce(function(a,x){return a+Math.min(e.progress[x.id]||0,x.sets)},0),all=p.items.reduce(function(a,x){return a+x.sets},0);
 root.innerHTML='<main class="app" style="--accent:'+accent+'"><header class="row"><div class="logo">'+esc(state.profile.name)+"'s Home Plan</div><button class=\"icon\" data-a=\"settings\">⚙</button></header>"+
 '<section class="hero"><div class="eyebrow">Week '+state.week+' of 12 · '+(state.selected===today()?"Today":new Date(state.selected+"T12:00:00").toLocaleDateString([],{weekday:"long"}))+'</div><h1>'+esc(p.label)+'</h1><div class="sub">'+esc(p.sub)+'</div><div class="hero-grid"><div class="metric"><b>'+sets+'/'+all+'</b><span>sets</span></div><div class="metric"><b>'+duration(e)+'</b><span>time</span></div><div class="metric"><b>'+weekPct()+'%</b><span>week</span></div></div></section>'+
 '<div class="phase"><div class="bubble">'+ph.icon+'</div><div><b>'+ph.name+' phase</b><p>'+ph.desc+'</p></div></div>'+weekSelector()+dayStrip()+
 '<nav class="tabs">'+tab("workout","Workout")+tab("habits","Habits")+tab("nutrition","Nutrition")+tab("progress","Progress")+'</nav>'+
 (state.tab==="workout"?workoutView(p,e):state.tab==="habits"?habitsView():state.tab==="nutrition"?nutritionView():progressView())+
 '<div class="foot">Built for treadmill, indoor bike, dumbbells, resistance bands, and bodyweight. Data stays on this device.</div></main>'+restBar()+modal()+(state.toast?'<div class="toast">'+esc(state.toast)+'</div>':"");bind()
}
function tab(k,l){return'<button class="tab '+(state.tab===k?"active":"")+'" data-a="tab" data-v="'+k+'">'+l+'</button>'}
function weekSelector(){var h='<div class="weekrow">';for(var i=1;i<=12;i++)h+='<button class="weekbtn '+(i===state.week?"active":"")+'" data-a="week" data-v="'+i+'">Week '+i+'</button>';return h+'</div>'}
function dayStrip(){var names=["M","T","W","T","F","S","S"],h='<div class="daystrip">';for(var i=0;i<7;i++){var ds=dateForWeekDay(state.week,i),sel=ds===state.selected,ok=state.workout[ds]&&state.workout[ds].completed;h+='<button class="day '+(sel?"active ":"")+(ok?"done":"")+'" data-a="date" data-v="'+ds+'"><div class="l">'+names[i]+'</div><div class="n">'+new Date(ds+"T12:00:00").getDate()+'</div></button>'}return h+'</div>'}
function workoutView(p,e){
 if(!p.items.length)return'<div class="card empty"><div style="font-size:36px">🌙</div><h3>Full rest day</h3><p>'+esc(p.coach)+'</p></div>';
 var h='<div class="card guide"><b>Coach note</b><p>'+esc(p.coach)+'</p></div><div class="session"><button class="start" data-a="start">'+(e.startedAt?"Session running":"Start session")+'</button><button data-a="finish">Finish all</button></div>';
 p.items.forEach(function(x){h+=exerciseCard(x,e)});
 h+='<div class="card"><div class="section" style="margin-top:0">Daily note</div><textarea class="note" data-note="'+state.selected+'" placeholder="Energy, soreness, joint comfort, wins, adjustments…">'+esc(state.prefs.notes[state.selected]||"")+'</textarea></div>';return h
}
function exerciseCard(x,e){
 var n=e.progress[x.id]||0,key=state.selected+"|"+x.id,d=state.prefs.details[key]||{},h='<section class="card '+(n>=x.sets?"complete":"")+'"><div class="ex-head"><div class="ex-name">'+esc(x.name)+'</div><div class="target">'+x.sets+'×'+esc(x.target)+'</div></div><div class="tip">ⓘ '+esc(x.tip)+'</div><div class="sets">';
 for(var i=0;i<x.sets;i++)h+='<button class="set '+(i<n?"done":"")+'" data-a="set" data-id="'+x.id+'" data-i="'+i+'" data-name="'+esc(x.name)+'">'+(i<n?"✓":i+1)+'</button>';
 h+='</div><div class="details"><input class="small" data-detail="'+key+'" data-field="weight" inputmode="decimal" placeholder="'+(x.kind==="cardio"?"Incline / resistance":"Dumbbell / band")+'" value="'+esc(d.weight||"")+'"><input class="small" data-detail="'+key+'" data-field="reps" placeholder="Actual reps / time" value="'+esc(d.reps||"")+'"></div><div class="rpe"><label>Effort</label><select data-detail="'+key+'" data-field="rpe"><option value="">RPE</option>';
 for(var r=5;r<=10;r++)h+='<option value="'+r+'" '+(String(d.rpe||"")===String(r)?"selected":"")+'>'+r+'/10</option>';
 h+='</select></div>'+(x.kind==="strength"?'<div class="suggestion">↗ '+esc(suggestion(x.id))+'</div>':"")+'</section>';return h
}
function habitsView(){
 var ds=state.selected,h=state.habits[ds]||{},items=[["movement","Daily movement","Walk or move outside the workout"],["water","Hydration","Drink regularly through the day"],["protein","Protein-rich meals","Include protein in main meals"],["produce","Fruit + vegetables","Aim for variety, not perfection"],["sleep","Sleep routine","Protect a consistent bedtime"],["recovery","Recovery check","Adjust if unusually sore or exhausted"]];
 return'<div class="card guide"><b>Consistency over extremes</b><p>These are flexible check-ins, not pass/fail rules. Sustainable habits support gradual fat loss and better training recovery.</p></div><div class="habits">'+items.map(function(x){return'<button class="habit '+(h[x[0]]?"done":"")+'" data-a="habit" data-v="'+x[0]+'">'+(h[x[0]]?"✓ ":"")+x[1]+'<span>'+x[2]+'</span></button>'}).join("")+'</div>'
}
function nutritionView(){
 var h='<div class="card guide"><b>Support fat loss without crash dieting</b><p>The app avoids inventing a restrictive calorie target. Most meals should include protein, produce, a satisfying carbohydrate, and some dietary fat.</p></div>';
 Object.keys(MEALS).forEach(function(g){h+='<div class="meal-group"><div class="meal-title">'+g+'</div>';MEALS[g].forEach(function(m){h+='<div class="meal"><b>'+esc(m[0])+'</b><p>'+esc(m[1])+'</p></div>'});h+='</div>'});return h
}
function progressView(){
 var latest=Object.keys(state.weights).sort().reverse()[0],mkeys=Object.keys(state.measurements).sort().reverse(),lastM=mkeys[0]?state.measurements[mkeys[0]]:{},pct=weekPct(),recent=Object.keys(state.workout).filter(function(k){return state.workout[k].completed}).sort().reverse().slice(0,8);
 return'<div class="stats"><div class="stat"><div>✨</div><div class="v">'+total()+'</div><div class="k">workouts</div></div><div class="stat"><div>📈</div><div class="v">'+pct+'%</div><div class="k">this week</div></div><div class="stat"><div>⚖️</div><div class="v">'+(latest?state.weights[latest]+" lb":"—")+'</div><div class="k">latest weight</div></div><div class="stat"><div>🍑</div><div class="v">'+(lastM.hips?lastM.hips+'"':"—")+'</div><div class="k">latest hips</div></div></div>'+
 '<div class="section">Weekly progress</div><div class="card"><div class="row"><b>'+pct+'% complete</b><span>'+phase(state.week).name+'</span></div><div class="bar" style="margin-top:12px"><span style="width:'+pct+'%"></span></div></div>'+
 '<div class="section">Recent completed days</div><div class="card">'+(recent.length?recent.map(function(d){var w=weekFromDate(d),p=planFor(w,new Date(d+"T12:00:00").getDay());return'<div class="row" style="padding:10px 0;border-bottom:1px solid var(--line)"><div><b>'+new Date(d+"T12:00:00").toLocaleDateString([],{month:"short",day:"numeric"})+'</b><div class="tip" style="margin:2px 0">'+esc(p.label)+'</div></div><span>✓</span></div>'}).join(""):'<div class="empty">Completed workouts will appear here.</div>')+'</div>'+
 '<div class="actions"><button class="action" data-a="weight">⚖ Log weight<span>Track the trend</span></button><button class="action" data-a="measure">📏 Measurements<span>Waist, hips, thigh</span></button><button class="action" data-a="export">⬇ Export<span>Back up progress</span></button><button class="action" data-a="import">⬆ Import<span>Restore backup</span></button></div><input id="importFile" type="file" accept="application/json" hidden>'
}
function restBar(){if(!state.rest)return"";return'<div class="rest '+(state.rest.left<=10?"urgent":"")+'"><div class="grow"><div class="eyebrow">Rest</div><div class="name">'+esc(state.rest.name)+'</div></div><div class="time">'+state.rest.left+'s</div><button data-a="plus">+30</button><button data-a="dismiss">✕</button></div>'}
function modal(){
 if(!state.modal)return"";
 if(state.modal==="settings")return'<div class="modal" data-a="close"><div class="sheet" onclick="event.stopPropagation()"><div class="row"><h2>Settings</h2><button class="icon" data-a="close">✕</button></div><div class="field"><label>Name</label><input id="setName" value="'+esc(state.profile.name)+'"></div><div class="field"><label>Default strength rest timer</label><select id="setRest"><option value="45">45 seconds</option><option value="60">60 seconds</option><option value="75">75 seconds</option><option value="90">90 seconds</option><option value="120">120 seconds</option></select></div><button class="primary" data-a="save-settings">Save settings</button></div></div>';
 if(state.modal==="weight")return'<div class="modal" data-a="close"><div class="sheet" onclick="event.stopPropagation()"><div class="row"><h2>Log weight</h2><button class="icon" data-a="close">✕</button></div><div class="field"><label>Date</label><input id="wDate" type="date" value="'+today()+'"></div><div class="field"><label>Weight (lb)</label><input id="wVal" type="number" step=".1"></div><button class="primary" data-a="save-weight">Save weight</button></div></div>';
 if(state.modal==="measure")return'<div class="modal" data-a="close"><div class="sheet" onclick="event.stopPropagation()"><div class="row"><h2>Measurements</h2><button class="icon" data-a="close">✕</button></div><div class="field"><label>Date</label><input id="mDate" type="date" value="'+today()+'"></div><div class="field"><label>Waist (inches)</label><input id="mWaist" type="number" step=".1"></div><div class="field"><label>Hips / glutes (inches)</label><input id="mHips" type="number" step=".1"></div><div class="field"><label>Thigh (inches)</label><input id="mThigh" type="number" step=".1"></div><button class="primary" data-a="save-measure">Save measurements</button></div></div>';
 return""
}
function onboard(){return'<main class="app onboard"><div style="width:100%"><div class="spark">🍑</div><div class="eyebrow">12-week home glute + body recomposition plan</div><h1>Strong. Steady. Home.</h1><p class="tip" style="font-size:15px">Built specifically for dumbbells, resistance bands, treadmill, bike, and bodyweight.</p><div class="field"><label>Your name</label><input id="obName" placeholder="Your name"></div><div class="field"><label>Starting weight (optional)</label><input id="obWeight" type="number" step=".1"></div><button id="enterBtn" class="primary" type="button" data-a="onboard">Start my plan</button><div class="warning">This is a general fitness plan, not medical treatment. Get appropriate medical clearance when pregnant, recently postpartum, managing a health condition, recovering from injury, or returning after a long period of inactivity. Stop for chest pain, faintness, severe shortness of breath, or sharp pain.</div></div></main>'}
function bind(){
 document.querySelectorAll("[data-a]").forEach(function(el){el.onclick=function(){var a=el.dataset.a;
  if(a==="tab"){state.tab=el.dataset.v;render()}
  else if(a==="week"){state.week=+el.dataset.v;state.selected=dateForWeekDay(state.week,0);render()}
  else if(a==="date"){state.selected=el.dataset.v;state.week=weekFromDate(state.selected);render()}
  else if(a==="set")tapSet(el.dataset.id,+el.dataset.i,el.dataset.name)
  else if(a==="start")start()
  else if(a==="finish")finish()
  else if(a==="habit"){var ds=state.selected;state.habits[ds]=state.habits[ds]||{};state.habits[ds][el.dataset.v]=!state.habits[ds][el.dataset.v];persist();render()}
  else if(a==="plus"){state.rest.left+=30;render()}
  else if(a==="dismiss"){state.rest=null;render()}
  else if(a==="settings"){state.modal="settings";render();setTimeout(function(){document.getElementById("setRest").value=state.prefs.rest||75},0)}
  else if(a==="weight"){state.modal="weight";render()}
  else if(a==="measure"){state.modal="measure";render()}
  else if(a==="close"){state.modal=null;render()}
  else if(a==="save-settings"){state.profile.name=document.getElementById("setName").value.trim()||state.profile.name;state.prefs.rest=+document.getElementById("setRest").value;save(K.profile,state.profile);persist();state.modal=null;pop("Settings saved")}
  else if(a==="save-weight"){var d=document.getElementById("wDate").value,v=parseFloat(document.getElementById("wVal").value);if(d&&!isNaN(v)){state.weights[d]=v;persist();state.modal=null;pop("Weight logged")}}
  else if(a==="save-measure"){var md=document.getElementById("mDate").value;if(md){state.measurements[md]={waist:document.getElementById("mWaist").value,hips:document.getElementById("mHips").value,thigh:document.getElementById("mThigh").value};persist();state.modal=null;pop("Measurements saved")}}
  else if(a==="onboard")doOnboard()
  else if(a==="export")exportData()
  else if(a==="import")document.getElementById("importFile").click()
 }});
 document.querySelectorAll("[data-note]").forEach(function(el){el.oninput=function(){state.prefs.notes[el.dataset.note]=el.value;persist()}})
 document.querySelectorAll("[data-detail]").forEach(function(el){el.onchange=el.oninput=function(){var k=el.dataset.detail;state.prefs.details[k]=state.prefs.details[k]||{};state.prefs.details[k][el.dataset.field]=el.value;persist()}})
 var f=document.getElementById("importFile");if(f)f.onchange=importData;
 var b=document.getElementById("enterBtn");if(b)b.addEventListener("touchend",function(ev){ev.preventDefault();doOnboard()},{passive:false})
}
function doOnboard(){var n=document.getElementById("obName").value.trim();if(!n){pop("Please enter your name");return}state.profile={name:n,createdAt:today()};var w=parseFloat(document.getElementById("obWeight").value);if(!isNaN(w))state.weights[today()]=w;save(K.profile,state.profile);persist();render()}
function exportData(){var data={version:3,profile:state.profile,workout:state.workout,weights:state.weights,prefs:state.prefs,habits:state.habits,measurements:state.measurements};var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="strong-steady-home-backup-"+today()+".json";a.click();URL.revokeObjectURL(a.href);pop("Backup exported")}
function importData(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{var x=JSON.parse(r.result);state.profile=x.profile||state.profile;state.workout=x.workout||{};state.weights=x.weights||{};state.prefs=x.prefs||state.prefs;state.habits=x.habits||{};state.measurements=x.measurements||{};save(K.profile,state.profile);persist();pop("Backup restored")}catch(err){pop("Could not import file")}};r.readAsText(f)}
render();
</script>
</body>
</html>
